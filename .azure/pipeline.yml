trigger:
  branches:
    include:
      - main

pool:
  vmImage: Default

variables:
  - group: project2-vars
  - name: IMAGE_TAG
    value: $(Build.BuildId)

stages:
  - stage: Build
    displayName: Build and Scan
    jobs:
      - job: BuildAndScan
        displayName: Build image and run Trivy scan
        steps:
          - task: AzureCLI@2
            displayName: Build Docker image
            inputs:
              azureSubscription: azure-rm
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                docker build -t $(ACR_LOGIN_SERVER)/ado-pipeline-aca:$(IMAGE_TAG) ./app

          - script: |
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              trivy image \
                --exit-code 1 \
                --severity CRITICAL,HIGH \
                --no-progress \
                $(ACR_LOGIN_SERVER)/ado-pipeline-aca:$(IMAGE_TAG)
            displayName: Trivy vulnerability scan

  - stage: Push
    displayName: Push to ACR
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: PushImage
        displayName: Push image to ACR
        steps:
          - task: AzureCLI@2
            displayName: Login and push to ACR
            inputs:
              azureSubscription: azure-rm
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)
                docker build -t $(ACR_LOGIN_SERVER)/ado-pipeline-aca:$(IMAGE_TAG) ./app
                docker push $(ACR_LOGIN_SERVER)/ado-pipeline-aca:$(IMAGE_TAG)

          - task: AzureCLI@2
            displayName: Validate image digest
            inputs:
              azureSubscription: azure-rm
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr repository show \
                  --name $(ACR_NAME) \
                  --image ado-pipeline-aca:$(IMAGE_TAG) \
                  --query digest \
                  --output tsv

  - stage: Deploy
    displayName: Deploy to Container Apps
    dependsOn: Push
    condition: succeeded()
    jobs:
      - deployment: DeployToACA
        displayName: Deploy to Azure Container Apps
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Update Container App revision
                  inputs:
                    azureSubscription: azure-rm
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp update \
                        --name $(CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image $(ACR_LOGIN_SERVER)/ado-pipeline-aca:$(IMAGE_TAG) \
                        --set-env-vars \
                          APP_ENV=$(APP_ENV) \
                          APP_REGION=$(APP_REGION)