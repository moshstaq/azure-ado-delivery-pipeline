trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
  - group: project2-vars
  - name: IMAGE_TAG
    value: $(Build.BuildId)
  - name: IMAGE_NAME
    value: $(ACR_LOGIN_SERVER)/ado-pipeline-aca:$(IMAGE_TAG)

stages:
  - stage: Build
    displayName: Build and Scan
    jobs:
      - job: BuildAndScan
        displayName: Build image and run Trivy scan
        steps:
          - script: |
              docker build -t $(IMAGE_NAME) ./app
            displayName: Build Docker image

          - script: |
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              trivy image \
                --exit-code 1 \
                --severity CRITICAL,HIGH \
                --no-progress \
                $(IMAGE_NAME)
            displayName: Trivy vulnerability scan

          - script: |
              docker save $(IMAGE_NAME) -o $(Build.ArtifactStagingDirectory)/image.tar
            displayName: Save image artifact

          - publish: $(Build.ArtifactStagingDirectory)/image.tar
            artifact: docker-image
            displayName: Publish image artifact

  - stage: Push
    displayName: Push to ACR
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: PushImage
        displayName: Push image to ACR
        steps:
          - download: current
            artifact: docker-image
            displayName: Download image artifact

          - script: |
              docker load -i $(Pipeline.Workspace)/docker-image/image.tar
            displayName: Load image from artifact

          - task: AzureCLI@2
            displayName: Login and push to ACR
            inputs:
              azureSubscription: azure-rm
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                az acr login --name $(ACR_NAME)
                docker push $(IMAGE_NAME)

          - task: AzureCLI@2
            displayName: Validate image digest
            inputs:
              azureSubscription: azure-rm
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                az acr repository show \
                  --name $(ACR_NAME) \
                  --image ado-pipeline-aca:$(IMAGE_TAG) \
                  --query digest \
                  --output tsv

  - stage: Deploy
    displayName: Deploy to Container Apps
    dependsOn: Push
    condition: succeeded()
    jobs:
      - deployment: DeployToACA
        displayName: Deploy to Azure Container Apps
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Update Container App revision
                  inputs:
                    azureSubscription: azure-rm
                    scriptType: bash
                    scriptLocation: inlineScript
                    addSpnToEnvironment: true
                    inlineScript: |
                      az containerapp update \
                        --name $(CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image $(IMAGE_NAME) \
                        --set-env-vars \
                          APP_ENV=$(APP_ENV) \
                          APP_REGION=$(APP_REGION)